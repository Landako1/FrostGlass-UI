# FrostGlass UI Template v1.0
frost_blue_button:
  aspect_ratio: 1/1
  show_state: true
  styles:
    card:
      - border-radius: 14px
      - background: >-
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.15) 0%,
          transparent 50%), linear-gradient(135deg, rgba(160, 200, 255,
          0.12) 0%, rgba(255, 255, 255, 0.02) 100%)
      - backdrop-filter: blur(25px)
      - "-webkit-backdrop-filter": blur(25px)
      - border-top: 1.5px solid rgba(255, 255, 255, 0.4)
      - border-left: 1.5px solid rgba(255, 255, 255, 0.4)
      - border-bottom: 1px solid rgba(255, 255, 255, 0.1)
      - border-right: 1px solid rgba(255, 255, 255, 0.1)
      - box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4)
      - padding: 5px
    icon:
      - color: rgb(210, 210, 210)
      - width: 40%
      - justify-self: center
    name:
      - color: "#FFFFFF"
      - font-weight: bold
      - font-size: 13px
      - justify-self: center
      - text-shadow: 0px 2px 4px rgba(0,0,0,0.5)
    state:
      - color: rgba(255, 252, 240, 0.8)
      - font-size: 11px
      - justify-self: center
      - text-shadow: 0px 1px 2px rgba(0,0,0,0.5)

  state:
    - value: "on"
      styles:
        card:
          - background: >-
              radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.25)
              0%, transparent 50%), linear-gradient(135deg, rgba(255, 140,
              0, 0.4) 0%, rgba(255, 80, 0, 0.1) 100%)
          - box-shadow: 0 10px 30px rgba(255, 120, 0, 0.3)
          - border-top: 1.5px solid rgba(255, 230, 200, 0.6)
          - border-left: 1.5px solid rgba(255, 230, 200, 0.6)
        icon:
          - color: "#FFB300"
          - filter: drop-shadow(0 0 5px rgba(255, 180, 0, 0.8))
        name:
          - color: "#FFFFFF"
